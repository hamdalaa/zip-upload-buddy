services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - catalog-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD}"]
    expose:
      - "6379"

  typesense:
    image: typesense/typesense:27.1
    command: "--data-dir /data --api-key=${TYPESENSE_API_KEY:?set TYPESENSE_API_KEY} --enable-cors=false"
    expose:
      - "8108"
    volumes:
      - catalog-typesense:/data

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    expose:
      - "9000"
      - "9001"
    volumes:
      - catalog-minio:/data

  catalog-api:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["node", "dist/api/server.js"]
    environment:
      PORT: 4400
      CATALOG_REPO_ROOT: /app
      CATALOG_BIND_HOST: 0.0.0.0
      DATABASE_URL: postgres://catalog:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/catalog
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379
      TYPESENSE_URL: http://typesense:8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:?set TYPESENSE_API_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-catalog-snapshots}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      STORAGE_FORCE_PATH_STYLE: "true"
      SNAPSHOT_STORAGE_DRIVER: s3
      SNAPSHOT_ENCRYPTION_KEY_BASE64: ${SNAPSHOT_ENCRYPTION_KEY_BASE64:?set SNAPSHOT_ENCRYPTION_KEY_BASE64}
      INTERNAL_SERVICE_TOKENS: ${INTERNAL_SERVICE_TOKENS:?set INTERNAL_SERVICE_TOKENS}
      TOKEN_PEPPER: ${TOKEN_PEPPER:?set TOKEN_PEPPER}
      INTERNAL_REQUIRE_REQUEST_SIGNATURE: "true"
      INTERNAL_REQUEST_MAX_SKEW_SECONDS: ${INTERNAL_REQUEST_MAX_SKEW_SECONDS:-300}
      CATALOG_ALLOW_INSECURE_DEFAULTS: "false"
    depends_on:
      - postgres
      - redis
      - typesense
      - minio
    ports:
      - "127.0.0.1:4400:4400"

  catalog-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["node", "dist/worker/run-worker.js"]
    environment:
      CATALOG_REPO_ROOT: /app
      DATABASE_URL: postgres://catalog:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/catalog
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379
      TYPESENSE_URL: http://typesense:8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:?set TYPESENSE_API_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-catalog-snapshots}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      STORAGE_FORCE_PATH_STYLE: "true"
      SNAPSHOT_STORAGE_DRIVER: s3
      SNAPSHOT_ENCRYPTION_KEY_BASE64: ${SNAPSHOT_ENCRYPTION_KEY_BASE64:?set SNAPSHOT_ENCRYPTION_KEY_BASE64}
      INTERNAL_SERVICE_TOKENS: ${INTERNAL_SERVICE_TOKENS:?set INTERNAL_SERVICE_TOKENS}
      TOKEN_PEPPER: ${TOKEN_PEPPER:?set TOKEN_PEPPER}
      INTERNAL_REQUIRE_REQUEST_SIGNATURE: "true"
      INTERNAL_REQUEST_MAX_SKEW_SECONDS: ${INTERNAL_REQUEST_MAX_SKEW_SECONDS:-300}
      CATALOG_ALLOW_INSECURE_DEFAULTS: "false"
    depends_on:
      - postgres
      - redis
      - typesense
      - minio

volumes:
  catalog-postgres:
  catalog-typesense:
  catalog-minio:
