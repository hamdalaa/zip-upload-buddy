limit_req_zone $binary_remote_addr zone=hayr_cf_api:10m rate=90r/m;

server {
  listen 80;
  listen [::]:80;
  server_name cf.h-db.site;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name cf.h-db.site;

  ssl_certificate /etc/ssl/certs/h-db.site-origin.pem;
  ssl_certificate_key /etc/ssl/private/h-db.site-origin.key;

  client_max_body_size 128k;

  location ~ /\.(?!well-known)(?:.*)$ {
    return 404;
  }

  location ~* ^/(?:wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|pma|server-status|server-info|vendor|node_modules)(?:/|$) {
    return 404;
  }

  location = /public/search {
    limit_req zone=hayr_cf_api burst=30 nodelay;
    proxy_pass http://127.0.0.1:4400;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location = /public/catalog-products {
    limit_req zone=hayr_cf_api burst=10 nodelay;
    proxy_pass http://127.0.0.1:4400;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location / {
    limit_req zone=hayr_cf_api burst=60 nodelay;
    proxy_pass http://127.0.0.1:4400;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }
}
