limit_req_zone $binary_remote_addr zone=hayr_public_api:10m rate=90r/m;
limit_req_zone $binary_remote_addr zone=hayr_public_search:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=hayr_static_abuse:10m rate=30r/m;

server {
  listen 80;
  listen [::]:80;
  server_name h-db.site www.h-db.site;

  return 301 https://h-db.site$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.h-db.site;

  ssl_certificate /etc/ssl/certs/h-db.site-origin.pem;
  ssl_certificate_key /etc/ssl/private/h-db.site-origin.key;

  return 301 https://h-db.site$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name h-db.site;

  ssl_certificate /etc/ssl/certs/h-db.site-origin.pem;
  ssl_certificate_key /etc/ssl/private/h-db.site-origin.key;

  root /var/www/hayr/dist;
  index index.html;
  autoindex off;

  client_max_body_size 128k;

  location = /index.html {
    add_header Cache-Control "no-cache, no-transform" always;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    try_files /index.html =404;
  }

  location = /sw.js {
    add_header Cache-Control "no-cache, no-transform" always;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    try_files /sw.js =404;
  }

  location = /sw-manifest.js {
    add_header Cache-Control "no-cache, no-transform" always;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    try_files /sw-manifest.js =404;
  }

  location = /_ {
    include /etc/nginx/snippets/hayr-security-headers.conf;
    return 404;
  }

  location = /_/ {
    include /etc/nginx/snippets/hayr-security-headers.conf;
    return 404;
  }

  location /_/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    try_files $uri =404;
  }

  location ~* ^/_/.+\.(?:map|ts|tsx|jsx|mjs|cjs|coffee|vue|svelte)$ {
    limit_req zone=hayr_static_abuse burst=10 nodelay;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    return 404;
  }

  location = /assets {
    include /etc/nginx/snippets/hayr-security-headers.conf;
    return 404;
  }

  location = /assets/ {
    include /etc/nginx/snippets/hayr-security-headers.conf;
    return 404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    try_files $uri =404;
  }

  location ~* ^/assets/.+\.(?:map|ts|tsx|jsx|mjs|cjs|coffee|vue|svelte)$ {
    limit_req zone=hayr_static_abuse burst=10 nodelay;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    return 404;
  }

  location ^~ /fonts/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    try_files $uri =404;
  }

  location ~* ^/answer-data/.+\.(?:md|markdown)$ {
    types {
      text/markdown md markdown;
    }
    default_type text/markdown;
    add_header Cache-Control "no-cache, no-transform" always;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    try_files $uri =404;
  }

  location ~ /\.(?!well-known)(?:.*)$ {
    limit_req zone=hayr_static_abuse burst=10 nodelay;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    return 404;
  }

  location ~* ^/(?:wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|pma|server-status|server-info|vendor|node_modules)(?:/|$) {
    limit_req zone=hayr_static_abuse burst=10 nodelay;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    return 404;
  }

  location ~* ^/(?:src|backend|scripts|tmp|outputs|generated|coverage|\.vite|\.next|\.nuxt|dist|build|storage|uploads-private)(?:/|$) {
    limit_req zone=hayr_static_abuse burst=10 nodelay;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    return 404;
  }

  location ~* ^/(?:api|graphql|admin|administrator|backup|backups|dump|dumps|database|db|logs)(?:/|$) {
    limit_req zone=hayr_static_abuse burst=10 nodelay;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    return 404;
  }

  location ~* ^/(?:composer\.(?:json|lock)|package(?:-lock)?\.json|pnpm-lock\.yaml|yarn\.lock|tsconfig\.json|vite\.config\.(?:ts|js)|tailwind\.config\.(?:ts|js)|README(?:\.md)?|AGENTS\.md|DESIGN\.md|\.env(?:\..*)?|catalog\.sqlite(?:-(?:wal|shm))?|.*\.(?:map|ts|tsx|jsx|sql|sqlite|bak|backup|old|orig|swp))$ {
    limit_req zone=hayr_static_abuse burst=10 nodelay;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    return 404;
  }

  location ^~ /public/ {
    limit_req zone=hayr_public_api burst=60 nodelay;
    add_header X-Robots-Tag "noindex, nofollow" always;
    proxy_pass http://127.0.0.1:4400;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location = /public/search {
    limit_req zone=hayr_public_search burst=20 nodelay;
    add_header X-Robots-Tag "noindex, nofollow" always;
    proxy_pass http://127.0.0.1:4400;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location = /public/catalog-products {
    limit_req zone=hayr_public_search burst=10 nodelay;
    add_header X-Robots-Tag "noindex, nofollow" always;
    proxy_pass http://127.0.0.1:4400;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location ^~ /internal/ {
    proxy_pass http://127.0.0.1:4400;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location ^~ /docs/ {
    proxy_pass http://127.0.0.1:4400;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location = /healthz {
    proxy_pass http://127.0.0.1:4400;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location / {
    add_header Cache-Control "no-cache, no-transform" always;
    include /etc/nginx/snippets/hayr-security-headers.conf;
    try_files $uri/index.html $uri $uri/ /index.html;
  }
}
